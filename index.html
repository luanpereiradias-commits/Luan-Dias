










<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>

    <style>
        body {
            font-family: Arial;
            background: url("https://logodownload.org/wp-content/uploads/2014/04/nike-logo-0.png") no-repeat center center fixed;
            background-size: 300px;
            background-color: #f2f2f2;
        }

        .container {
            width: 400px;
            margin: auto;
            background: rgba(255, 255, 255, 0.95); /* leve transparência */
            padding: 20px;
            border-radius: 10px;
            margin-top: 50px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Cadastro de Cliente</h2>

    <form onsubmit="redirecionar(event)">
        <input type="text" placeholder="Nome" required>
        <input type="email" placeholder="Email" required>
        <input type="tel" placeholder="Telefone" required>

        <button type="submit">Cadastrar</button>
    </form>
</div>

<script>
    function redirecionar(event) {
        event.preventDefault();
        alert("Cadastro realizado com sucesso!");

        setTimeout(() => {
            window.location.href = "https://www.nike.com/br/";
        }, 1000);
    }
</script>

</body>
</html>
